name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (X.Y.Z)
        required: true
        type: string
      notes:
        description: Optional one-line release notes
        required: false
        type: string
      dry_run:
        description: Preview release without mutating remote state
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-main
  cancel-in-progress: false

jobs:
  ensure-release-readiness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_version: ${{ steps.validate-version.outputs.final_version }}
      package_name: ${{ steps.package-meta.outputs.package_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Read package metadata
        id: package-meta
        run: |
          printf 'package_name=%s\n' "$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          printf 'current_version=%s\n' "$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Validate release version
        id: validate-version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          CURRENT_VERSION: ${{ steps.package-meta.outputs.current_version }}
        run: |
          node <<'EOF'
          const fs = require('node:fs')

          const input = process.env.INPUT_VERSION ?? ''
          const current = process.env.CURRENT_VERSION ?? ''

          const semver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)$/
          if (!input) throw new Error('version input is required')
          if (input.startsWith('v')) throw new Error('version must not start with v')
          if (!semver.test(input)) throw new Error('version must match X.Y.Z')
          if (!semver.test(current)) throw new Error(`current package version is not strict semver: ${current}`)

          const toTuple = (value) => value.split('.').map((part) => Number(part))
          const [inMajor, inMinor, inPatch] = toTuple(input)
          const [curMajor, curMinor, curPatch] = toTuple(current)

          const isGreater =
            inMajor > curMajor ||
            (inMajor === curMajor && inMinor > curMinor) ||
            (inMajor === curMajor && inMinor === curMinor && inPatch > curPatch)

          if (!isGreater) {
            throw new Error(`version ${input} must be greater than current version ${current}`)
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `final_version=${input}\n`)
          EOF

      - name: Check release state
        env:
          FINAL_VERSION: ${{ steps.validate-version.outputs.final_version }}
          PACKAGE_NAME: ${{ steps.package-meta.outputs.package_name }}
        run: |
          set -euo pipefail

          git fetch --force --tags origin

          TAG_EXISTS=false
          if git rev-parse --verify --quiet "refs/tags/v${FINAL_VERSION}" >/dev/null; then
            TAG_EXISTS=true
          fi

          NPM_EXISTS=false
          NPM_ERROR_FILE="$(mktemp)"
          if npm view "${PACKAGE_NAME}@${FINAL_VERSION}" version --registry=https://registry.npmjs.org/ >/dev/null 2>"${NPM_ERROR_FILE}"; then
            NPM_EXISTS=true
          else
            if ! grep -Eq '(E404|404|Not found)' "${NPM_ERROR_FILE}"; then
              cat "${NPM_ERROR_FILE}" >&2
              rm -f "${NPM_ERROR_FILE}"
              exit 1
            fi
          fi
          rm -f "${NPM_ERROR_FILE}"

          if [ "$TAG_EXISTS" = true ] && [ "$NPM_EXISTS" = true ]; then
            echo "Release v${FINAL_VERSION} already exists in git and npm"
            exit 1
          fi

          if [ "$TAG_EXISTS" = true ] || [ "$NPM_EXISTS" = true ]; then
            echo "Partial release detected for v${FINAL_VERSION}: tag=${TAG_EXISTS}, npm=${NPM_EXISTS}"
            exit 1
          fi

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: ensure-release-readiness
    steps:
      - name: Guard dispatch branch is main
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow must be dispatched from main. Current ref: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Checkout dispatch SHA
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Fetch main and tags
        run: |
          set -euo pipefail
          git fetch --force origin main
          git fetch --force --tags origin

      - name: Assert dispatch SHA is latest main HEAD
        run: |
          set -euo pipefail
          REMOTE_MAIN_SHA="$(git rev-parse refs/remotes/origin/main)"
          if [ "$REMOTE_MAIN_SHA" != "$GITHUB_SHA" ]; then
            echo "Workflow must run from latest origin/main. origin/main=${REMOTE_MAIN_SHA}, dispatch=${GITHUB_SHA}"
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.6

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24.11.1
          registry-url: https://registry.npmjs.org

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

      - name: Build package
        run: bun run build

      - name: Bump package version without lifecycle hooks
        env:
          FINAL_VERSION: ${{ needs.ensure-release-readiness.outputs.final_version }}
        run: |
          set -euo pipefail
          node <<'EOF'
          const fs = require('node:fs')

          const path = 'package.json'
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'))
          pkg.version = process.env.FINAL_VERSION
          fs.writeFileSync(path, `${JSON.stringify(pkg, null, 2)}\n`)
          EOF

      - name: Verify published package contents
        run: npm pack --dry-run

      - name: Prepare release body
        env:
          FINAL_VERSION: ${{ needs.ensure-release-readiness.outputs.final_version }}
          RELEASE_NOTES: ${{ inputs.notes }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          {
            echo "# todo-continuation-enforcer v${FINAL_VERSION}"
            echo
            if [ -n "${RELEASE_NOTES}" ]; then
              echo "${RELEASE_NOTES}"
            else
              echo "Release created from ${GITHUB_SHA}."
              echo
              echo "Run: https://github.com/${REPOSITORY}/actions/runs/${RUN_ID}"
            fi
          } > "$RUNNER_TEMP/release-body.md"

      - name: Create local release commit
        env:
          FINAL_VERSION: ${{ needs.ensure-release-readiness.outputs.final_version }}
        run: |
          set -euo pipefail
          git add package.json
          git commit -m "chore: release v${FINAL_VERSION}"

      - name: Create local release tag
        env:
          FINAL_VERSION: ${{ needs.ensure-release-readiness.outputs.final_version }}
        run: git tag "v${FINAL_VERSION}"

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        env:
          FINAL_VERSION: ${{ needs.ensure-release-readiness.outputs.final_version }}
        run: |
          set -euo pipefail
          {
            echo "## Dry run summary"
            echo
            echo "- Release version: v${FINAL_VERSION}"
            echo "- No remote state was mutated."
            echo "- Would run: npm publish --provenance --access public --registry=https://registry.npmjs.org/"
            echo "- Would run: git push --atomic origin HEAD:main refs/tags/v${FINAL_VERSION}"
            echo "- Would run: gh release create v${FINAL_VERSION} --verify-tag --notes-file \"$RUNNER_TEMP/release-body.md\""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight release push
        if: ${{ !inputs.dry_run }}
        env:
          FINAL_VERSION: ${{ needs.ensure-release-readiness.outputs.final_version }}
        run: |
          set -euo pipefail
          git push --dry-run --atomic origin HEAD:main "refs/tags/v${FINAL_VERSION}"

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: |
          set -euo pipefail
          unset NODE_AUTH_TOKEN NPM_TOKEN
          if [ -f .npmrc ] && grep -Eq '(^|[[:space:]])(_authToken|authToken)' .npmrc; then
            echo "Refusing to publish with auth token settings in repo-level .npmrc"
            exit 1
          fi
          NPM_CONFIG_USERCONFIG="$(mktemp)"
          trap 'rm -f "$NPM_CONFIG_USERCONFIG"' EXIT
          printf 'registry=https://registry.npmjs.org/\n' > "$NPM_CONFIG_USERCONFIG"
          npm_config_userconfig="$NPM_CONFIG_USERCONFIG" npm publish --provenance --access public --registry=https://registry.npmjs.org/

      - name: Push release commit and tag
        if: ${{ !inputs.dry_run }}
        env:
          FINAL_VERSION: ${{ needs.ensure-release-readiness.outputs.final_version }}
        run: |
          set -euo pipefail
          git push --atomic origin HEAD:main "refs/tags/v${FINAL_VERSION}"

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}
          FINAL_VERSION: ${{ needs.ensure-release-readiness.outputs.final_version }}
        run: |
          set -euo pipefail
          gh release create "v${FINAL_VERSION}" \
            --repo "${{ github.repository }}" \
            --verify-tag \
            --notes-file "$RUNNER_TEMP/release-body.md"
